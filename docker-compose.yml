services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: tareadb
      MYSQL_ROOT_PASSWORD: tu_password_seguro
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: api_tareas
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__MySqlConnection=Server=db;Database=tareadb;User=root;Password=tu_password_seguro;
      - Jwt__Key=TuClaveSuperSecretaDeMasDe32Caracteres!
      - Jwt__Issuer=ApiTareas
      - Jwt__Audience=ApiTareasUsuarios



